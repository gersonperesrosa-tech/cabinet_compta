{% extends "base.html" %}

{% block content %}
<section class="section">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Modifier le groupe : {{ group.name }}</h1>
    <a href="{% url 'admin_groups_list' %}" class="btn btn-outline-secondary">Retour</a>
</div>

<form method="POST" class="card p-4 shadow-sm">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nom du groupe</label>
        <input type="text" name="name" class="form-control" value="{{ group.name }}">
    </div>

    <div class="row">
        <div class="col-md-6">
            <label class="form-label">Permissions disponibles</label>
            <select multiple size="15" class="form-select">
                {% for perm in permissions %}
                    {% if perm not in group.permissions.all %}
                        <option value="{{ perm.id }}">{{ perm.name }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">Permissions du groupe</label>
            <select name="permissions" multiple size="15" class="form-select">
                {% for perm in group.permissions.all %}
                    <option value="{{ perm.id }}" selected>{{ perm.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <button class="btn btn-primary mt-4">Enregistrer</button>
</form>

</section>
{% endblock %}
