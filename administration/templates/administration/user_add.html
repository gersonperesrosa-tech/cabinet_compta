{% extends "base.html" %}

{% block content %}
<section class="section">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Ajouter un utilisateur</h1>
    <a href="{% url 'admin_users_list' %}" class="btn btn-outline-secondary">Retour</a>
</div>

<form method="POST" class="card p-4 shadow-sm" style="max-width: 600px;">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        {{ form.username }}
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        {{ form.email }}
    </div>

    <!-- AJOUT : Prénom -->
    <div class="mb-3">
        <label class="form-label">Prénom</label>
        {{ form.first_name }}
    </div>

    <!-- AJOUT : Nom -->
    <div class="mb-3">
        <label class="form-label">Nom</label>
        {{ form.last_name }}
    </div>

    <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        {{ form.password }}
    </div>

    <div class="mb-3">
        <label class="form-label">Groupe</label>
        {{ form.group }}
    </div>

    <div class="form-check mb-3">
        {{ form.is_staff }}
        <label class="form-check-label" for="{{ form.is_staff.id_for_label }}">
            Statut équipe
        </label>
    </div>

    <div class="form-check mb-3">
        {{ form.is_superuser }}
        <label class="form-check-label" for="{{ form.is_superuser.id_for_label }}">
            Super utilisateur
        </label>
    </div>

    <button class="btn btn-primary">Créer l'utilisateur</button>
</form>

</section>
{% endblock %}
