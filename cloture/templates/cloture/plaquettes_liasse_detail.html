{% extends "base.html" %}
{% load cloture_tags %}
{% block content %}
<section class="section">

<h1 class="mb-4">
    Plaquettes & Liasse – {{ module.client.nom }} ({{ module.cloture.annee }})
</h1>

<form method="POST">
    {% csrf_token %}

    <div class="row g-4">

        <!-- COLONNE GAUCHE -->
        <div class="col-md-8">

            <div class="mb-4">
                <label class="form-label fw-bold">Plaquette envoi client</label>
                <textarea name="plaquette_envoi_client" class="form-control" rows="2" style="resize:none;">
{{ module.plaquette_envoi_client|default_if_none:"" }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Plaquette retour client</label>
                <textarea name="plaquette_retour_client" class="form-control" rows="2" style="resize:none;">
{{ module.plaquette_retour_client|default_if_none:"" }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Liasse envoi client</label>
                <textarea name="liasse_envoi_client" class="form-control" rows="2" style="resize:none;">
{{ module.liasse_envoi_client|default_if_none:"" }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Liasse retour client</label>
                <textarea name="liasse_retour_client" class="form-control" rows="2" style="resize:none;">
{{ module.liasse_retour_client|default_if_none:"" }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">CA > 152 500 €</label>
                <textarea name="ca_152500" class="form-control" rows="2" style="resize:none;">
{{ module.ca_152500|default_if_none:"" }}</textarea>
            </div>

        </div>

        <!-- COLONNE DROITE -->
        <div class="col-md-4">

            <div class="p-3 border rounded bg-light">

                <h5 class="mb-3">Statuts</h5>

                <label class="form-label fw-bold">Plaquette envoi client</label>
                <select name="statut_plaquette_envoi_client" class="form-select mb-3">
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_plaquette_envoi_client == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <label class="form-label fw-bold">Plaquette retour client</label>
                <select name="statut_plaquette_retour_client" class="form-select mb-3">
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_plaquette_retour_client == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <label class="form-label fw-bold">Liasse envoi client</label>
                <select name="statut_liasse_envoi_client" class="form-select mb-3">
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_liasse_envoi_client == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <label class="form-label fw-bold">Liasse retour client</label>
                <select name="statut_liasse_retour_client" class="form-select mb-3">
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_liasse_retour_client == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

            </div>

        </div>
    </div>

    <!-- STATUT GÉNÉRAL -->
    <div class="mt-4">
        <h5 class="fw-bold">Statut général</h5>
        <select name="statut_general" class="form-select w-50">
            {% for value, label in statuts %}
                <option value="{{ value }}" {% if module.statut_general == value %}selected{% endif %}>
                    {{ label }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-primary mt-4">Enregistrer</button>

</form>

</section>
{% endblock %}
