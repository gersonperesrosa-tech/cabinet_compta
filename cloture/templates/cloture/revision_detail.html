{% extends "base.html" %}
{% load cloture_tags %}
{% block content %}
<section class="section">

<h1 class="mb-4">
    Révision, Plaquette et Liasse – {{ module.client.nom }} ({{ module.cloture.annee }})
</h1>

<form method="POST">
    {% csrf_token %}

    <div class="row g-4">

        <!-- ========================= -->
        <!-- COLONNE GAUCHE (70%)     -->
        <!-- ========================= -->
        <div class="col-md-8">

            <!-- Pré-révision -->
            <div class="mb-4">
                <label class="form-label fw-bold">Pré-révision</label>
                <textarea name="pre_revision" class="form-control" rows="2" style="resize:none;">{{ module.pre_revision|default_if_none:"" }}</textarea>
            </div>

            <!-- Relance de pièces -->
            <div class="mb-4">
                <label class="form-label fw-bold">Relance de pièces</label>
                <textarea name="relance_pieces" class="form-control" rows="2" style="resize:none;">{{ module.relance_pieces|default_if_none:"" }}</textarea>
            </div>

            <!-- Relevé bancaire -->
            <div class="mb-4">
                <label class="form-label fw-bold">Relevé bancaire</label>
                <textarea name="releve_bancaire" class="form-control" rows="2" style="resize:none;">{{ module.releve_bancaire|default_if_none:"" }}</textarea>
            </div>

            <!-- Révision AD -->
            <div class="mb-4">
                <label class="form-label fw-bold">Révision AD</label>
                <textarea name="revision_ad" class="form-control" rows="2" style="resize:none;">{{ module.revision_ad|default_if_none:"" }}</textarea>
            </div>

            <!-- ========================= -->
            <!-- NOUVEAUX CHAMPS PLAQUETTE / LIASSE -->
            <!-- ========================= -->

            <div class="mb-4">
                <label class="form-label fw-bold">Plaquette</label>
                <textarea name="plaquette_envoi_client" class="form-control" rows="2" style="resize:none;">
{{ module.plaquette_envoi_client|default_if_none:"" }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Liasse</label>
                <textarea name="liasse_envoi_client" class="form-control" rows="2" style="resize:none;">
{{ module.liasse_envoi_client|default_if_none:"" }}</textarea>
            </div>

        </div>

        <!-- ========================= -->
        <!-- COLONNE DROITE (30%)     -->
        <!-- ========================= -->
        <div class="col-md-4">

            <div class="p-3 border rounded bg-light">

                <h5 class="mb-3">Statuts</h5>

                <!-- Statut pré-révision -->
                <label class="form-label fw-bold">Pré-révision</label>
                <select name="statut_pre_revision" class="form-select mb-3">
                    <option value="">-- Statut --</option>
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_pre_revision == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <!-- Statut relance pièces -->
                <label class="form-label fw-bold">Relance de pièces</label>
                <select name="statut_relance_pieces" class="form-select mb-3">
                    <option value="">-- Statut --</option>
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_relance_pieces == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <!-- Statut relevé bancaire -->
                <label class="form-label fw-bold">Relevé bancaire</label>
                <select name="statut_releve_bancaire" class="form-select mb-3">
                    <option value="">-- Statut --</option>
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_releve_bancaire == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <!-- Statut révision AD -->
                <label class="form-label fw-bold">Révision AD</label>
                <select name="statut_revision_ad" class="form-select mb-3">
                    <option value="">-- Statut --</option>
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_revision_ad == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <!-- ========================= -->
                <!-- NOUVEAUX STATUTS PLAQUETTE / LIASSE -->
                <!-- ========================= -->

                <label class="form-label fw-bold">Plaquette</label>
                <select name="statut_plaquette_envoi_client" class="form-select mb-3">
                    <option value="">-- Statut --</option>
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_plaquette_envoi_client == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <label class="form-label fw-bold">Liasse</label>
                <select name="statut_liasse_envoi_client" class="form-select mb-3">
                    <option value="">-- Statut --</option>
                    {% for value, label in statuts %}
                        <option value="{{ value }}" {% if module.statut_liasse_envoi_client == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

            </div>

        </div>
    </div>

    <!-- ========================= -->
    <!-- STATUT GÉNÉRAL (EN BAS)   -->
    <!-- ========================= -->
    <div class="mt-4">
        <h5 class="fw-bold">Statut général</h5>
        <select name="statut_general" class="form-select w-50">
            <option value="">-- Statut général --</option>
            {% for value, label in statuts %}
                <option value="{{ value }}" {% if module.statut_general == value %}selected{% endif %}>
                    {{ label }}
                </option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-primary mt-4">Enregistrer</button>

</form>

</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const generalSelect = document.querySelector("select[name='statut_general']");
    if (!generalSelect) return;

    generalSelect.addEventListener("change", function () {
        const value = this.value;

        // Si statut général = N/A → appliquer N/A à tous les autres statuts
        if (value === "na") {
            document.querySelectorAll("select[name^='statut_']").forEach(select => {
                if (select.name !== "statut_general") {
                    select.value = "na";
                }
            });
        }
        // Si statut général ≠ N/A → ne rien modifier
    });
});
</script>

{% endblock %}
