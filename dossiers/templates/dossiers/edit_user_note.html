{% extends "base.html" %}

{% block extra_head %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
    #editor {
        height: 250px;
        background: white;
        border: 1px solid #ced4da;
        border-radius: 5px;
        padding: 10px;
    }
</style>
{% endblock %}

{% block content %}

<div class="container py-4">

    <!-- HEADER + ACTIONS -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Modifier la note</h3>

        <div class="d-flex gap-2">
            <a href="{% url 'delete_user_note' note.id %}" class="btn btn-danger">Supprimer</a>
            <a href="{% url 'user_notes' %}" class="btn btn-outline-secondary">Retour</a>
        </div>
    </div>


    <!-- ========================= -->
    <!-- BLOC : Édition de la note -->
    <!-- ========================= -->
    <div class="card shadow-sm">
        <div class="card-header fw-bold">Modifier la note</div>
        <div class="card-body">

            <form method="POST" id="edit-note-form">
                {% csrf_token %}
                <input type="hidden" name="edit_note" value="1">

                <label class="form-label">Titre</label>
                <input type="text" name="titre" class="form-control mb-3"
                       value="{{ note.titre }}">

                <label class="form-label">Catégorie</label>
                <select name="categorie" class="form-control mb-3">
                    <option value="">Aucune</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}"
                            {% if note.categorie and note.categorie.id == cat.id %}selected{% endif %}>
                            {{ cat.nom }}
                        </option>
                    {% endfor %}
                </select>

                <label class="form-label">Contenu</label>
                <div id="editor">{{ note.contenu|safe }}</div>
                <input type="hidden" name="contenu" id="contenu-hidden">

                <button class="btn btn-primary mt-3 w-100">Enregistrer les modifications</button>
            </form>

        </div>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['clean']
            ]
        }
    });

    const form = document.getElementById("edit-note-form");

    form.addEventListener("submit", function () {
        document.getElementById("contenu-hidden").value = quill.root.innerHTML;
    });

});
</script>
{% endblock %}
