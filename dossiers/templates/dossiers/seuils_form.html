{% extends "base.html" %}

{% block content %}
<section class="section">

<h1 class="mb-4">Seuil fiscal</h1>

<div class="card p-4 shadow-sm" style="max-width: 600px;">
    <form method="POST">
        {% csrf_token %}

        <!-- MODULE -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Module fiscal</label>
            {{ form.module }}
        </div>

        <!-- CODE -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Type de seuil</label>
            {{ form.code }}
        </div>

        <!-- VALEUR -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Valeur du seuil (€)</label>
            {{ form.valeur }}
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a href="{% url 'seuils_list' %}" class="btn btn-outline-secondary">
                Annuler
            </a>

            <button type="submit" class="btn btn-primary">
                Enregistrer
            </button>
        </div>
    </form>
</div>

</section>
{% endblock %}
