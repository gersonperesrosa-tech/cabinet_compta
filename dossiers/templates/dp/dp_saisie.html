{% extends "base.html" %}
{% load custom_filters %}
{% block content %}

<section class="section">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="m-0">Dossier Permanent – {{ client.nom }}</h1>

    <a href="{% url 'dp_gestion' %}" class="btn btn-secondary">
        Retour
    </a>
</div>

<form method="POST">
    {% csrf_token %}

    <table class="table table-bordered align-middle mt-4">

        <!-- Dossier déontologie -->
        <tr>
            <th>Dossier déontologie</th>
            <td>
                <input type="text"
                       name="dossier_deontologie"
                       class="form-control"
                       value="{{ declaration.dossier_deontologie|empty_dash }}">
            </td>
        </tr>

        <!-- Acceptation LAB -->
        <tr>
            <th>Acceptation LAB</th>
            <td>
                <input type="text"
                       name="acceptation_lab"
                       class="form-control"
                       value="{{ declaration.acceptation_lab|empty_dash }}">
            </td>
        </tr>

        <!-- Pièce d'identité -->
        <tr>
            <th>Pièce d'identité</th>
            <td>
                <input type="text"
                       name="piece_identite"
                       class="form-control"
                       value="{{ declaration.piece_identite|empty_dash }}">
            </td>
        </tr>

        <!-- Statut -->
        <tr>
            <th>Statut</th>
            <td>
                <input type="text"
                       name="statut"
                       class="form-control"
                       value="{{ declaration.statut|empty_dash }}">
            </td>
        </tr>

        <!-- Bail -->
        <tr>
            <th>Bail</th>
            <td>
                <input type="text"
                       name="bail"
                       class="form-control"
                       value="{{ declaration.bail|empty_dash }}">
            </td>
        </tr>

        <!-- Lettre de mission -->
        <tr>
            <th>Lettre de mission</th>
            <td>
                <input type="text"
                       name="lettre_mission"
                       class="form-control"
                       value="{{ declaration.lettre_mission|empty_dash }}">
            </td>
        </tr>

        <!-- Avenant -->
        <tr>
            <th>Avenant</th>
            <td>
                <input type="text"
                       name="avenant"
                       class="form-control"
                       value="{{ declaration.avenant|empty_dash }}">
            </td>
        </tr>

    </table>

    <!-- Boutons bas de page -->
    <div class="d-flex justify-content-end mt-4">

        <button type="submit" class="btn btn-primary">
            Enregistrer
        </button>
    </div>

</form>

</section>

{% endblock %}
