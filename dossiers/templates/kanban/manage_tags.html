{% extends "base.html" %}

{% block content %}

<section class="section">

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="mb-4">Gestion des tags</h2>
    <div class="d-flex align-items-center gap-2">

    <a href="{% url 'kanban_board' %}" class="btn btn-secondary mb-3">
        ← Retour au Kanban
    </a>
    </div>

</div>


    <table class="table table-striped align-middle">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Couleur</th>
                <th>Utilisé par</th>
                <th class="text-end">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for tag in tags %}
            <tr>
                <td>{{ tag.name }}</td>

                <td>
                    <span class="badge" style="background: {{ tag.color }};">&nbsp;&nbsp;</span>
                    {{ tag.color }}
                </td>

                <td>
                    {{ tag.kanbancardtag_set.count }} carte(s)
                </td>

                <td class="text-end">
                    <a href="{% url 'edit_kanban_tag' tag.id %}" class="btn btn-sm btn-outline-primary">
                        Modifier
                    </a>

                    <a href="{% url 'delete_kanban_tag' tag.id %}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Supprimer ce tag ?');">
                        Supprimer
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
