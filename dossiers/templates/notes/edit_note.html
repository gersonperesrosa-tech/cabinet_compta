{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
#editor {
    height: 250px;
    background: white;
    border: 1px solid #ced4da;
    border-radius: 6px;
    padding: 10px;
}

.editor-container {
    width: 100%;
    max-width: 1500px;
    margin: auto;
}
</style>
{% endblock %}

{% block content %}

<div class="container py-4 editor-container">

    <!-- HEADER + ACTIONS -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Modifier la note – {{ note.client.nom }}</h3>

        <div class="d-flex gap-2">
            <a href="{% url 'client_notes' note.client.id %}" class="btn btn-outline-secondary">
                Retour
            </a>
        </div>
    </div>

    <!-- ========================= -->
    <!-- FORMULAIRE D'ÉDITION -->
    <!-- ========================= -->
    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST" id="edit-note-form">
                {% csrf_token %}

                <!-- CONTENU -->
                <label class="form-label">Contenu</label>
                <div id="editor">{{ note.contenu|safe }}</div>
                <input type="hidden" name="contenu" id="contenu-hidden">

                <!-- CATEGORIE -->
                <label class="form-label mt-3">Catégorie</label>
                <select name="categorie" class="form-select mb-3">
                    <option value="">—</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if note.categorie_id == cat.id %}selected{% endif %}>
                            {{ cat.nom }}
                        </option>
                    {% endfor %}
                </select>

                <!-- TAGS -->
                <label class="form-label">Tags</label>
                <select name="tags" class="form-select mb-3" multiple>
                    {% for tag in tags %}
                        <option value="{{ tag.id }}"
                            {% if tag in note.tags.all %}selected{% endif %}>
                            {{ tag.nom }}
                        </option>
                    {% endfor %}
                </select>

                <button class="btn btn-primary w-100 mt-3">Enregistrer les modifications</button>
            </form>

        </div>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Initialisation Quill
    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Modifier la note…',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['clean']
            ]
        }
    });

    // Envoi du contenu HTML dans le champ caché
    const form = document.getElementById("edit-note-form");
    form.addEventListener("submit", function () {
        document.getElementById("contenu-hidden").value = quill.root.innerHTML;
    });

});
</script>
{% endblock %}
