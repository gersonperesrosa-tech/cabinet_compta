<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>{{ subject }}</title>
</head>

<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial, sans-serif;">

<!-- PREHEADER (invisible) -->
<span style="display:none;visibility:hidden;mso-hide:all;font-size:1px;color:#f4f6f9;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    {{ preheader }}
</span>

<!-- HEADER -->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#013363;padding:25px 0;">
  <tr>
    <td align="center">

      {% if brand_logo %}
      <img src="{{ brand_logo }}" alt="Logo" style="max-width:180px;margin-bottom:10px;">
      {% endif %}

      <h2 style="color:white;margin:0;font-size:22px;font-weight:600;">
        {{ brand_name }}
      </h2>

    </td>
  </tr>
</table>

<!-- CONTENT -->
<table width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td align="center" style="padding:30px 15px;">
      <table width="600" cellpadding="0" cellspacing="0" 
             style="background:white;border-radius:12px;padding:30px;
                    box-shadow:0 3px 12px rgba(0,0,0,0.08);">
        <tr>
          <td style="font-size:16px;color:#333;line-height:1.7;">
            {% block content %}{% endblock %}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

<!-- FOOTER -->
<table width="100%" cellpadding="0" cellspacing="0" style="padding:25px 0;color:#777;font-size:12px;">
  <tr>
    <td align="center">
      {{ brand_name }} — Notification automatique<br>
      Merci de ne pas répondre à cet email.
    </td>
  </tr>
</table>

</body>
</html>
